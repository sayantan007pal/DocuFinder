version: "3.9"

# Docker Compose for frontend + backend integration
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8001}
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8001}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - docufinder
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    extends:
      file: docker-compose.yml
      service: api
    networks:
      - docufinder

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - docufinder
    restart: unless-stopped

networks:
  docufinder:
    driver: bridge
