version: "3.9"

# ============================================================
# Company Document Finder v2 — Docker Compose
# NOTE: Qdrant is cloud-hosted — no local qdrant container
# ============================================================

x-api-env: &api-env
  env_file: .env
  environment:
    - ENVIRONMENT=development

services:

  # ── Valkey (BSD-licensed Redis fork) ──────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: docufinder_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 8 ─────────────────────────────────────────────
  mongodb:
    image: mongo:8
    container_name: docufinder_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-docufinderpassword}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-company_docs}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Unstructured.io x4 (parsing containers) ───────────────
  unstructured-1:
    image: downloads.unstructured.io/unstructured-io/unstructured:latest
    container_name: docufinder_unstructured_1
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  unstructured-2:
    image: downloads.unstructured.io/unstructured-io/unstructured:latest
    container_name: docufinder_unstructured_2
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  unstructured-3:
    image: downloads.unstructured.io/unstructured-io/unstructured:latest
    container_name: docufinder_unstructured_3
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  unstructured-4:
    image: downloads.unstructured.io/unstructured-io/unstructured:latest
    container_name: docufinder_unstructured_4
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Nginx load balancer for Unstructured ─────────────────
  unstructured-lb:
    image: nginx:alpine
    container_name: docufinder_unstructured_lb
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/unstructured.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - unstructured-1
      - unstructured-2
      - unstructured-3
      - unstructured-4
    restart: unless-stopped

  # ── FastAPI (main API) ────────────────────────────────────
  api:
    build: .
    container_name: docufinder_api
    ports:
      - "8001:8001"
    <<: *api-env
    depends_on:
      valkey:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      unstructured-lb:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
      - watch_root_data:/app/watch_root
    extra_hosts:
      # Allow containers to reach Ollama on host machine (Mac)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build: .
    container_name: docufinder_worker
    command: >
      celery -A src.ingestion.tasks worker
      --concurrency=2
      --queues=ingest,default
      --loglevel=info
      --max-tasks-per-child=50
    <<: *api-env
    depends_on:
      valkey:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - watch_root_data:/app/watch_root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Celery Beat (scheduler) ───────────────────────────────
  beat:
    build: .
    container_name: docufinder_beat
    command: >
      celery -A src.ingestion.tasks beat
      --scheduler celery.beat:PersistentScheduler
      --loglevel=info
    <<: *api-env
    depends_on:
      valkey:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ── Flower (Celery monitoring) ────────────────────────────
  flower:
    image: mher/flower:2
    container_name: docufinder_flower
    command: celery flower --broker=${VALKEY_URL:-valkey://valkey:6379/0} --port=5555
    ports:
      - "5555:5555"
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped

  # ── Arize Phoenix (RAG observability / tracing) ───────────
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: docufinder_phoenix
    ports:
      - "6006:6006"
      - "4317:4317"  # OTLP gRPC
    restart: unless-stopped

  # ── ClamAV (virus scanning — optional) ───────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: docufinder_clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    # ⚠️ Downloads virus definitions on startup (~5-10 minutes)

  # ── MinIO (self-hosted S3 — for backups) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: docufinder_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── GPU Embedding Worker (optional — comment out if no GPU)
  # embed-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.embed
  #   container_name: docufinder_embed_worker
  #   ports:
  #     - "50051:50051"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     EMBED_BATCH_SIZE: 256
  #   restart: unless-stopped

volumes:
  valkey_data:
  mongo_data:
  uploads_data:
  watch_root_data:
  clamav_data:
  minio_data:
